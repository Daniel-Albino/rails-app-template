# =============================================================================
# docker-compose.yml - Service orchestration for DEVELOPMENT
# For production, use docker-compose.prod.yml override.
# =============================================================================

name: my_app

services:
  # ---------------------------------------------------------------------------
  # Rails Application
  # ---------------------------------------------------------------------------
  rails:
    build:
      context: .
      dockerfile: Dockerfile
      target: development          # Use development stage
    image: my_app:development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Hot reload: mount local source into container
      - .:/app
      # Persist gems outside app volume (avoid conflicts)
      - bundle_cache:/usr/local/bundle
    env_file:
      - .env
      - docker/environments/development.env
    environment:
      - RAILS_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - PATH=/usr/local/bundle/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    stdin_open: true   # Enable interactive `rails console`
    tty: true          # Required for TTY-based debugging
    networks:
      - my_app_network

  # ---------------------------------------------------------------------------
  # Sidekiq worker
  # ---------------------------------------------------------------------------
  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: my_app:development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rails:
        condition: service_healthy
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    env_file:
      - .env
      - docker/environments/development.env
    environment:
      - RAILS_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - SKIP_DB_PREPARE=true
    networks:
      - my_app_network

  # ---------------------------------------------------------------------------
  # DB - PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-my_app_development}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d   # Optional init scripts
    ports:
      - "${POSTGRES_PORT:-5432}:5432"    # Exposed for local tools (TablePlus, DBeaver, etc.)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-my_app_development}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - my_app_network

  # ---------------------------------------------------------------------------
  # Redis - Cache and Action Cable
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"       # Exposed for local inspection (RedisInsight, etc.)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - my_app_network

  # ---------------------------------------------------------------------------
  # Mailpit - Email testing in development (not for production)
  # Access via http://localhost:8025
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - my_app_network

# =============================================================================
# Persistent volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  bundle_cache:
    driver: local

# =============================================================================
# Internal network
# =============================================================================
networks:
  my_app_network:
    driver: bridge
