# =============================================================================
# docker-compose.prod.yml - PRODUCTION override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

name: my_app

services:
  rails:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: my_app:production
    container_name: my_app_rails_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes: []    # No hot reload in production
    env_file:
      - .env
      - docker/environments/production.env
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-my_app_production}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: my_app:production
    container_name: my_app_sidekiq_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rails:
        condition: service_healthy
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes: []
    env_file:
      - .env
      - docker/environments/production.env
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-my_app_production}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SKIP_DB_PREPARE=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: my_app_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-my_app_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # In production: do NOT expose DB port externally
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: my_app_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  # Mailpit does not run in production
  mailpit:
    profiles:
      - donotstart

  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: my_app_nginx
    restart: always
    depends_on:
      - rails
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./public:/app/public:ro
      - nginx_logs:/var/log/nginx
    networks:
      - my_app_network

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
