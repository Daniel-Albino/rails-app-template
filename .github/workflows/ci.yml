# =============================================================================
# .github/workflows/ci.yml
# CI pipeline for GitHub Actions.
# Runs on each push and pull request to main/develop.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  RUBY_VERSION: "3.3.6"
  NODE_VERSION: "20"
  RAILS_ENV: test
  DATABASE_URL: postgresql://postgres:password@localhost:5432/my_app_test
  REDIS_URL: redis://localhost:6379/0

jobs:
  # ---------------------------------------------------------------------------
  # Linting and static analysis
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --no-color --format github

      - name: Brakeman
        run: bundle exec brakeman --no-progress --quiet

      - name: Bundle Audit
        run: bundle exec bundler-audit check --update

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: RSpec Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: my_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install Yarn dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare database
        run: bundle exec rails db:prepare

      - name: Run RSpec
        run: |
          bundle exec rspec \
            --format progress \
            --format json \
            --out tmp/rspec_results.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rspec-results
          path: tmp/rspec_results.json

  # ---------------------------------------------------------------------------
  # Build production Docker image
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (Production)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: my_app:${{ github.sha }}
