# =============================================================================
# config/locales/pt.yml
# Traduções em Português para a aplicação.
# =============================================================================

pt:
  # Datas e horas
  date:
    formats:
      default: "%d/%m/%Y"
      short:   "%d %b"
      long:    "%d de %B de %Y"
    day_names:
      - domingo
      - segunda-feira
      - terça-feira
      - quarta-feira
      - quinta-feira
      - sexta-feira
      - sábado
    abbr_day_names:
      - Dom
      - Seg
      - Ter
      - Qua
      - Qui
      - Sex
      - Sáb
    month_names:
      - ~
      - janeiro
      - fevereiro
      - março
      - abril
      - maio
      - junho
      - julho
      - agosto
      - setembro
      - outubro
      - novembro
      - dezembro
    abbr_month_names:
      - ~
      - Jan
      - Fev
      - Mar
      - Abr
      - Mai
      - Jun
      - Jul
      - Ago
      - Set
      - Out
      - Nov
      - Dez
    order:
      - :day
      - :month
      - :year

  time:
    formats:
      default: "%d/%m/%Y às %H:%M"
      short:   "%d %b %H:%M"
      long:    "%d de %B de %Y às %H:%M"

  # Active Record
  activerecord:
    errors:
      messages:
        record_invalid: "A validação falhou: %{errors}"
        restrict_dependent_destroy:
          has_one:  "Não é possível apagar o registo porque existe um %{record} dependente"
          has_many: "Não é possível apagar o registo porque existem %{record} dependentes"
      models: {}
      attributes: {}

  # Erros gerais
  errors:
    format: "%{attribute} %{message}"
    messages:
      accepted:               "deve ser aceite"
      blank:                  "não pode estar em branco"
      confirmation:           "não coincide com %{attribute}"
      empty:                  "não pode estar vazio"
      equal_to:               "deve ser igual a %{count}"
      even:                   "deve ser par"
      exclusion:              "está reservado"
      greater_than:           "deve ser maior que %{count}"
      greater_than_or_equal_to: "deve ser maior ou igual a %{count}"
      inclusion:              "não está incluído na lista"
      invalid:                "não é válido"
      less_than:              "deve ser menor que %{count}"
      less_than_or_equal_to:  "deve ser menor ou igual a %{count}"
      model_invalid:          "A validação falhou: %{errors}"
      not_a_number:           "não é um número"
      not_an_integer:         "deve ser um número inteiro"
      odd:                    "deve ser ímpar"
      other_than:             "deve ser diferente de %{count}"
      present:                "deve estar em branco"
      required:               "deve existir"
      taken:                  "já está a ser utilizado"
      too_long:               "é demasiado longo (máximo de %{count} caracteres)"
      too_short:              "é demasiado curto (mínimo de %{count} caracteres)"
      wrong_length:           "tem tamanho errado (deve ter %{count} caracteres)"

  # Flash messages genéricas
  flash:
    actions:
      create:
        notice: "%{resource_name} criado com sucesso."
        alert:  "Erro ao criar %{resource_name}."
      update:
        notice: "%{resource_name} actualizado com sucesso."
        alert:  "Erro ao actualizar %{resource_name}."
      destroy:
        notice: "%{resource_name} eliminado com sucesso."
        alert:  "Erro ao eliminar %{resource_name}."

  # Paginação (se usares kaminari/pagy)
  views:
    pagination:
      first:    "&laquo; Primeiro"
      last:     "Último &raquo;"
      previous: "&lsaquo; Anterior"
      next:     "Seguinte &rsaquo;"
      truncate: "&hellip;"

  # Helpers comuns
  helpers:
    select:
      prompt: "Selecciona uma opção"
    submit:
      create: "Criar %{model}"
      update: "Guardar alterações"
      submit: "Submeter"
