# =============================================================================
# config/sidekiq.yml
# Configuração do Sidekiq — queues e concorrência.
# =============================================================================

:concurrency: <%= ENV.fetch("SIDEKIQ_CONCURRENCY", 5) %>

:queues:
  - [critical, 10]   # Prioridade máxima (emails urgentes, pagamentos)
  - [default, 5]     # Jobs normais
  - [mailers, 3]     # Envio de emails
  - [low, 1]         # Jobs de baixa prioridade (relatórios, exports)

:max_retries: 3

:dead_max_jobs: 1_000
:dead_timeout_in_seconds: <%= 6.months.to_i %>

# Logging
:verbose: <%= Rails.env.development? %>
