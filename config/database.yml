# =============================================================================
# config/database.yml
# Configuração da base de dados para todos os ambientes.
# Usa variáveis de ambiente para todas as credenciais.
# =============================================================================

default: &default
  adapter: postgresql
  encoding: unicode
  # Usa DATABASE_URL se definido, caso contrário usa variáveis individuais
  url: <%= ENV['DATABASE_URL'] %>
  host: <%= ENV.fetch('POSTGRES_HOST', 'db') %>
  username: <%= ENV.fetch('POSTGRES_USER', 'postgres') %>
  password: <%= ENV.fetch('POSTGRES_PASSWORD', 'password') %>
  port: <%= ENV.fetch('POSTGRES_PORT', 5432) %>
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>
  timeout: 5000
  connect_timeout: 10
  checkout_timeout: 5

development:
  <<: *default
  database: <%= ENV.fetch('POSTGRES_DB', 'my_app_development') %>

test:
  <<: *default
  database: my_app_test

production:
  <<: *default
  database: <%= ENV.fetch('POSTGRES_DB', 'my_app_production') %>
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>
  # Em produção: usa sempre DATABASE_URL
  # Exemplo: DATABASE_URL=postgresql://user:pass@host:5432/my_app_production
